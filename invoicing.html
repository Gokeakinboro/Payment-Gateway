<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice & Collect — Paylode</title>
<link rel="stylesheet" href="paylode-ui.css?v=3">
<style>
  :root { --g:#16a34a; --p:#1a2744; --lime:#7dc534; --ink:#111827; --muted:#6b7280; --line:#cbd5e1; --bg:#f6f7f9; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif; margin:0; background:var(--bg); color:var(--ink); }
  header { background:#fff; border-bottom:1px solid var(--line); padding:14px 22px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:17px; margin:0; }
  header a { font-size:13px; color:var(--p); text-decoration:none; }
  .tabs { display:flex; gap:4px; flex-wrap:wrap; padding:12px 22px 0; background:#fff; border-bottom:1px solid var(--line); }
  .tab { padding:9px 14px; border:0; background:none; font-size:14px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; }
  .tab.active { background:transparent; color:var(--p); border-bottom-color:var(--lime); border-bottom-width:3px; font-weight:700; }
  main { max-width:1000px; margin:22px auto; padding:0 22px; }
  .panel { display:none; } .panel.active { display:block; }
  .card { background:#fff; border:2px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  h2 { font-size:15px; margin:0 0 12px; }
  label { display:block; font-size:12px; color:var(--muted); margin:10px 0 4px; }
  input,select,textarea { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  button.btn { background:var(--lime); color:#1a2744; border:0; padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; margin-top:12px; }
  button.btn.sec { background:#fff; color:var(--ink); border:1px solid var(--line); }
  button.mini { font-size:12px; padding:5px 9px; border-radius:6px; border:1px solid var(--line); background:#fff; cursor:pointer; margin-right:4px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:600; }
  .badge { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .b-paid{background:#dcfce7;color:#15803d}.b-sent{background:#dbeafe;color:#1d4ed8}.b-draft{background:#f3f4f6;color:#374151}
  .b-part{background:#fef9c3;color:#854d0e}.b-over{background:#fee2e2;color:#b91c1c}.b-cancel{background:#f3f4f6;color:#9ca3af}
  .msg { font-size:13px; margin-top:10px; }
  .msg.ok{color:#15803d}.msg.err{color:#b91c1c}
  .muted{color:var(--muted);font-size:13px}
  .right{ text-align:right }
</style>
</head>
<body>
<header>
  <h1>Invoice &amp; Collect</h1>
  <a href="dashboard.html">← Back to dashboard</a>
</header>
<div class="tabs" id="tabs"></div>
<main id="main"></main>

<script>
const API = window.location.origin + '/api/v1/invoicing';
const TOKEN = sessionStorage.getItem('paylode_token');
const ngn = (k) => '₦' + (Number(k)/100).toLocaleString('en-NG',{minimumFractionDigits:2});
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const el = (id) => document.getElementById(id);

async function api(path, opts={}) {
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (res.status === 401) { location.href = 'login.html'; return {status:false,message:'Session expired'}; }
  const ct = res.headers.get('content-type')||'';
  if (ct.includes('application/json')) return res.json();
  return res;
}

const TABS = [
  ['invoices','Invoices'], ['items','Items'], ['contacts','Contacts'], ['lists','Lists'],
  ['format','Invoice Format'], ['departments','Departments'], ['reports','Reports'],
];
let active = 'invoices';
function renderTabs(){
  el('tabs').innerHTML = TABS.map(([k,l])=>`<button class="tab ${k===active?'active':''}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(k){ active=k; renderTabs(); render(); }
function render(){ ({invoices:tInvoices,items:tItems,qr:tQr,contacts:tContacts,lists:tLists,format:tFormat,departments:tDepartments,reports:tReports}[active])(); }

// Departments cache (incl. service-charge config) for the session.
let DEPTS = [];
async function loadDeptCache(){ const d = await api('/departments'); DEPTS = (d.status && d.data) ? d.data : []; return DEPTS; }
function deptById(id){ return DEPTS.find(x=>x.id===id) || null; }

// ── ITEMS (per-department catalogue) ─────────────────────────
async function tItems(){
  el('main').innerHTML = `
   <div class="card"><h2>Add catalogue item</h2>
     <div class="grid3">
       <div><label>Name</label><input id="p_name" placeholder="e.g. Beer (bottle)"></div>
       <div><label>Default price (₦)</label><input id="p_amt" type="number" min="0" step="0.01"></div>
       <div><label>Department (optional)</label><select id="p_dept"><option value="">All departments</option></select></div>
     </div>
     <label>Description (optional)</label><input id="p_desc">
     <button class="btn" onclick="saveItem()">Save item</button><div class="msg" id="p_msg"></div>
   </div>
   <div class="card"><h2>Import from CSV</h2>
     <div class="muted" style="font-size:12px;margin-bottom:8px">Columns: <strong>Product Name, Category, Selling Price</strong> (price in naira). Only rows with a price are imported (max 1000). <a href="javascript:void(0)" onclick="downloadSample()">Download sample</a></div>
     <div class="grid2">
       <div><label>Import into department (optional)</label><select id="p_impdept"><option value="">All departments</option></select></div>
       <div><label>CSV file</label><input type="file" id="p_impfile" accept=".csv,text/csv" onchange="importCsv(this)"></div>
     </div>
     <div class="msg" id="p_impmsg"></div>
   </div>
   <div class="card"><h2>Catalogue</h2>
     <div style="display:flex;gap:8px;margin-bottom:10px">
       <input id="p_search" placeholder="Search items…" oninput="loadItems()" style="flex:2">
       <select id="p_fdept" onchange="loadItems()" style="flex:1"><option value="">All departments</option></select>
     </div>
     <div id="p_list" class="muted">Loading…</div></div>`;
  await loadDeptCache();
  const opts = '<option value="">All departments</option>' + DEPTS.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
  el('p_dept').innerHTML = opts; el('p_fdept').innerHTML = opts; el('p_impdept').innerHTML = opts;
  loadItems();
}
// Simple CSV parser (handles quoted fields + embedded commas/newlines).
function parseCsv(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===',') { row.push(cur); cur=''; }
    else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
    else if(c!=='\r') cur+=c;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
function importCsv(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ()=>{
    const rows=parseCsv(String(reader.result||''));
    if(rows.length<2){ setMsg('p_impmsg','CSV looks empty.','err'); return; }
    const hdr=rows[0].map(h=>h.trim().toLowerCase());
    const ni=hdr.findIndex(h=>h.includes('name')||h.includes('product'));
    const pi=hdr.findIndex(h=>h.includes('price')||h.includes('selling')||h.includes('amount'));
    const ci=hdr.findIndex(h=>h.includes('categor')||h.includes('description'));
    if(ni<0||pi<0){ setMsg('p_impmsg','CSV needs a "Product Name" column and a "Selling Price" column.','err'); input.value=''; return; }
    const items=[];
    for(let r=1;r<rows.length;r++){ const row=rows[r]; const name=(row[ni]||'').trim(); const price=parseFloat(String(row[pi]||'').replace(/[^0-9.]/g,''));
      if(!name||!(price>0)) continue;  // only products with a price
      items.push({ name, default_amount:Math.round(price*100), description: ci>=0?((row[ci]||'').trim()||undefined):undefined }); }
    if(!items.length){ setMsg('p_impmsg','No rows with a name and a positive price were found.','err'); input.value=''; return; }
    if(items.length>1000){ setMsg('p_impmsg',`Too many priced rows (${items.length}); max 1000 per import.`,'err'); input.value=''; return; }
    setMsg('p_impmsg',`Importing ${items.length} item(s)…`,'ok');
    const res=await api('/products/import',{method:'POST',body:JSON.stringify({ department_id: el('p_impdept').value||undefined, items })});
    setMsg('p_impmsg', res.message, res.status?'ok':'err');
    if(res.status){ input.value=''; loadItems(); }
  };
  reader.readAsText(file);
}
function downloadSample(){
  const csv='Product Name,Category,Selling Price\nBeer (bottle) 60cl,BEER,1000\nRed Wine 750ml,WINE,4800\nSoft drink 60cl,SOFT DRINKS,450\n';
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='paylode-catalogue-sample.csv'; a.click();
}
async function loadItems(){
  const q=(el('p_search')&&el('p_search').value.trim())||''; const dept=(el('p_fdept')&&el('p_fdept').value)||'';
  const qs=new URLSearchParams(); if(q) qs.set('q',q); if(dept) qs.set('department_id',dept);
  const r=await api('/products'+(qs.toString()?`?${qs}`:''));
  if(!r.status){ el('p_list').innerHTML=`<span class="msg err">${r.message}</span>`; return; }
  if(!r.data.length){ el('p_list').innerHTML='<span class="muted">No items.</span>'; return; }
  el('p_list').innerHTML = `<table><tr><th>Name</th><th class="right">Price</th><th>Department</th><th></th></tr>`+
    r.data.map(p=>`<tr><td>${esc(p.name)}</td><td class="right">${p.default_amount==null?'—':ngn(p.default_amount)}</td>
      <td>${p.department_id?esc((deptById(p.department_id)||{}).name||'—'):'All'}</td>
      <td class="right"><button class="mini" onclick='editItem(${JSON.stringify(p)})'>Edit</button>
        <button class="mini" onclick="delItem('${p.id}')">Delete</button></td></tr>`).join('')+`</table>`;
}
let _editItemId=null;
function editItem(p){ _editItemId=p.id; el('p_name').value=p.name; el('p_amt').value=p.default_amount==null?'':(p.default_amount/100);
  el('p_dept').value=p.department_id||''; el('p_desc').value=p.description||''; el('p_msg').textContent='Editing — Save to update.'; window.scrollTo(0,0); }
async function saveItem(){
  const name=el('p_name').value.trim(); if(!name) return setMsg('p_msg','Name is required.','err');
  const amt=el('p_amt').value; const body={ name, default_amount: amt===''?null:Math.round(parseFloat(amt)*100),
    department_id: el('p_dept').value||undefined, description: el('p_desc').value||undefined };
  const r=_editItemId ? await api('/products/'+_editItemId,{method:'PUT',body:JSON.stringify(body)})
                      : await api('/products',{method:'POST',body:JSON.stringify(body)});
  setMsg('p_msg', r.message, r.status?'ok':'err');
  if(r.status){ _editItemId=null; el('p_name').value=el('p_amt').value=el('p_desc').value=''; loadItems(); }
}
async function delItem(id){ if(!confirm('Delete this item?'))return; const r=await api('/products/'+id,{method:'DELETE'}); if(r.status) loadItems(); }

// ── INVOICES ─────────────────────────────────────────────
async function tInvoices(){
  el('main').innerHTML = `
   <div class="card"><h2>Create invoice</h2>
     <div class="grid2">
       <div><label>Currency</label><select id="i_cur"><option>NGN</option><option>USD</option></select></div>
       <div><label>Department (optional)</label><select id="i_dept" onchange="onInvDeptChange()"><option value="">—</option></select></div>
     </div>
     <label>Line items <span class="muted" style="font-weight:400">(pick from catalogue or add custom · max 15)</span></label>
     <input id="i_search" placeholder="Click to browse catalogue, or type to search — tick items to add" oninput="searchCatalog()" onfocus="searchCatalog()" style="margin-bottom:6px">
     <div id="i_catalog"></div>
     <div id="i_items"></div>
     <button type="button" class="btn sec" onclick="addItem()" style="margin-top:6px">+ Add custom item</button>
     <div id="i_svcwrap" style="margin-top:10px"></div>
     <div class="right" style="margin-top:8px;font-weight:700">Total: <span id="i_total">₦0.00</span></div>
     <label>Description / note (optional)</label><input id="i_desc" placeholder="Shown on the invoice">
     <label>Recipients — from address book <span class="muted" style="font-weight:400">(optional · tick each, or Pick all)</span></label>
     <input id="i_csearch" placeholder="Click to browse saved contacts, or type a name/email to filter" oninput="searchInvContacts()" onfocus="searchInvContacts()">
     <label style="display:flex;gap:6px;align-items:center;margin:6px 0 4px;font-weight:600"><input type="checkbox" id="i_call" style="width:auto" onchange="pickAllContacts(this)"> Pick all contacts</label>
     <div id="i_csel" class="muted" style="font-size:12px;margin-bottom:4px"></div>
     <div id="i_clist"></div>
     <div class="grid3">
       <div><label>Recipient email</label><input id="i_email" type="email" placeholder="single recipient"></div>
       <div><label>Recipient name</label><input id="i_name"></div>
       <div><label>Recipient phone</label><input id="i_phone" placeholder="for WhatsApp/SMS (optional)"></div>
     </div>
     <div class="grid3">
       <div><label>Schedule send (optional)</label><input id="i_sched" type="datetime-local"></div>
       <div><label>Due date (optional)</label><input id="i_due" type="date"></div>
       <div><label>Reminders</label><div style="display:flex;gap:6px"><input id="i_rint" type="number" min="1" placeholder="every N days"><input id="i_rcnt" type="number" min="0" placeholder="count"></div></div>
     </div>
     <div style="display:flex;gap:18px;margin-top:10px">
       <label style="display:flex;gap:6px;align-items:center;margin:0"><input type="checkbox" id="i_vat" style="width:auto"> Charge VAT (7.5%)</label>
       <label style="display:flex;gap:6px;align-items:center;margin:0"><input type="checkbox" id="i_part" style="width:auto"> Allow part payment</label>
     </div>
     <button class="btn" onclick="createInvoice()">Create &amp; send</button>
     <div class="msg" id="i_msg"></div>
   </div>
   <div class="card"><h2>Invoices</h2><div id="i_list" class="muted">Loading…</div></div>`;
  await loadDeptCache();
  el('i_dept').innerHTML = '<option value="">—</option>' + DEPTS.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
  addItem();
  loadInvoices();
}
async function loadInvoices(){
  const r = await api('/invoices');
  if (!r.status) { el('i_list').innerHTML = `<span class="msg err">${r.message}</span>`; return; }
  if (!r.data.length) { el('i_list').innerHTML = '<span class="muted">No invoices yet.</span>'; return; }
  el('i_list').innerHTML = `<table><tr><th>Number</th><th>Recipient</th><th class="right">Total</th><th class="right">Paid</th><th>Status</th><th></th></tr>` +
    r.data.map(i=>`<tr><td>${esc(i.invoice_number)}</td><td>${esc(i.recipient_email||'—')}</td><td class="right">${ngn(i.total_amount)}</td><td class="right">${ngn(i.amount_paid)}</td><td>${badge(i.status,i.is_overdue)}</td>
      <td class="right"><button class="mini" onclick="shareInv('${i.id}')">Share</button>${(i.amount_paid===0 && ['draft','scheduled','sent','viewed'].indexOf(i.status)!==-1)?`<button class="mini" onclick="editInv('${i.id}')">Edit</button>`:''}<button class="mini" onclick="resend('${i.id}')">Resend</button>${i.status!=='paid'?`<button class="mini" onclick="cancelInv('${i.id}')">Cancel</button>`:''}${(i.amount_paid===0 && i.status!=='paid' && i.status!=='part_paid')?`<button class="mini" onclick="delInv('${i.id}')">Delete</button>`:''}</td></tr>`).join('') + `</table>`;
}
// Share an invoice as a link + QR (uses GET /invoices/:id/share).
async function shareInv(id){
  const r = await api(`/invoices/${id}/share`);
  if(!r.status) return setMsg('i_msg', r.message, 'err');
  el('i_msg').className='msg ok';
  el('i_msg').innerHTML = `Share link: <a href="${r.data.link_url}" target="_blank">${esc(r.data.link_url)}</a>
    <button class="mini" onclick="copyShare('${r.data.link_url}')">Copy</button>
    <a class="mini" href="/api/v1/invoicing/invoices/${id}/share?format=png" target="_blank">QR PNG</a>
    <div style="margin-top:6px"><img src="${r.data.qr_png}" alt="Invoice QR" style="width:150px;height:150px"></div>`;
  window.scrollTo(0,0);
}
// Edit an unpaid invoice — load it into the form and switch Create → Save changes.
let _editInvId=null;
async function editInv(id){
  const r = await api(`/invoices/${id}`); if(!r.status) return setMsg('i_msg', r.message, 'err');
  const inv=r.data; _editInvId=id;
  el('i_dept').value=inv.department_id||''; onInvDeptChange();
  el('i_cur').value=inv.currency||'NGN'; el('i_desc').value=inv.description||'';
  el('i_email').value=inv.recipient_email||''; el('i_name').value=inv.recipient_name||''; el('i_vat').checked=!!inv.charge_vat;
  el('i_items').innerHTML='';
  (inv.line_items||[]).forEach(it=>addItem(it.name||it.description||'', (it.unit_amount!=null?it.unit_amount:it.amount)/100, it.quantity||1));
  if(!el('i_items').children.length) addItem();
  if(inv.apply_service_charge && el('i_svc')) el('i_svc').checked=true;
  calcTotal();
  const btn=document.querySelector('button[onclick="createInvoice()"]'); if(btn) btn.textContent='Save changes';
  setMsg('i_msg', `Editing ${esc(inv.invoice_number)} — make changes and Save.`, 'ok'); window.scrollTo(0,0);
}
function resetInvForm(){ _editInvId=null; el('i_items').innerHTML=''; addItem(); el('i_desc').value=el('i_email').value=el('i_name').value=el('i_phone').value=''; clearInvRecipients();
  const btn=document.querySelector('button[onclick="createInvoice()"]'); if(btn) btn.textContent='Create & send'; }
function badge(s,over){ const m={paid:'b-paid',sent:'b-sent',viewed:'b-sent',draft:'b-draft',part_paid:'b-part',cancelled:'b-cancel'}; const cls=over&&s!=='paid'?'b-over':(m[s]||'b-draft'); return `<span class="badge ${cls}">${over&&s!=='paid'?'overdue':s}</span>`; }
// Item row = name + unit price + quantity; amount = unit × qty.
function addItem(name, unit, qty, pid){
  const div = document.createElement('div');
  div.className = 'i-row'; div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center';
  if(pid!=null) div.dataset.pid = pid;
  div.innerHTML = '<input class="i-name" placeholder="Item" style="flex:2" value="'+(name?esc(name):'')+'">'+
    '<input class="i-unit" type="number" min="1" step="0.01" placeholder="Unit ₦" style="flex:1" oninput="calcTotal()" value="'+(unit!=null&&unit!==''?unit:'')+'">'+
    '<input class="i-qty" type="number" min="1" step="1" placeholder="Qty" style="width:74px" oninput="calcTotal()" value="'+(qty||1)+'">'+
    '<button type="button" class="mini" title="Remove" onclick="this.closest(\'.i-row\').remove();calcTotal()">✕</button>';
  el('i_items').appendChild(div); calcTotal();
}
function invItems(){
  const items=[];
  document.querySelectorAll('#i_items .i-row').forEach(function(row){
    const name=row.querySelector('.i-name').value.trim();
    const unit=parseFloat(row.querySelector('.i-unit').value); const qty=parseInt(row.querySelector('.i-qty').value,10);
    if(name && unit>0 && qty>0) items.push({ name, unit_amount:Math.round(unit*100), quantity:qty });
  });
  return items;
}
function svcApplied(){ const c=el('i_svc'); return !!(c && c.checked); }
function calcTotal(){
  const items=invItems(); const sub=items.reduce((s,it)=>s+it.unit_amount*it.quantity,0);
  const dep=deptById(el('i_dept')&&el('i_dept').value); const pct=(dep&&Number(dep.service_charge_pct))||0;
  const svc=(svcApplied()&&pct>0)?Math.round(sub*pct/100):0;
  const vat=(el('i_vat')&&el('i_vat').checked)?Math.round(sub*0.075):0;
  const label=(dep&&dep.service_charge_label)||'Service charge';
  el('i_total').innerHTML = ngn(sub+svc+vat) + ((svc||vat)?` <span class="muted" style="font-weight:400">(items ${ngn(sub)}${svc?` + ${esc(label)} ${ngn(svc)}`:''}${vat?` + VAT ${ngn(vat)}`:''})</span>`:'');
}
function onInvDeptChange(){
  const dep=deptById(el('i_dept').value); const w=el('i_svcwrap');
  w.innerHTML = (dep && Number(dep.service_charge_pct)>0)
    ? `<label style="display:flex;gap:6px;align-items:center;margin:0"><input type="checkbox" id="i_svc" style="width:auto" onchange="calcTotal()"> Apply ${esc(dep.service_charge_label||'Service charge')} (${dep.service_charge_pct}%)</label>`
    : '';
  calcTotal();
}
let _catTimer=null;
// Browse/search the (department-scoped) catalogue and render it as a tick-box list.
// Empty query = browse ALL items in the department; typing filters. Ticking a box
// adds the item as a line-item row (qty editable below); unticking removes it.
function searchCatalog(){
  const q=el('i_search').value.trim(); if(_catTimer) clearTimeout(_catTimer);
  _catTimer=setTimeout(async ()=>{
    const qs=new URLSearchParams(); if(q) qs.set('q',q);
    const dept=el('i_dept').value; if(dept) qs.set('department_id',dept);
    const r=await api('/products?'+qs.toString());
    if(!r.status){ el('i_catalog').innerHTML='<div class="muted" style="font-size:12px">'+esc(r.message||'Could not load catalogue')+'</div>'; return; }
    if(!r.data.length){ el('i_catalog').innerHTML='<div class="muted" style="font-size:12px">'+(q?'No matching items.':'No catalogue items yet — add them under the Items tab, or use “+ Add custom item” below.')+'</div>'; return; }
    const added=new Set([...document.querySelectorAll('#i_items .i-row[data-pid]')].map(x=>x.dataset.pid));
    el('i_catalog').innerHTML = '<div style="max-height:210px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:2px 8px;margin-bottom:6px">'+
      r.data.slice(0,100).map(p=>`<label style="display:flex;justify-content:space-between;align-items:center;padding:5px 2px;border-bottom:1px solid var(--line);cursor:pointer">
        <span><input type="checkbox" style="width:auto;margin-right:8px"${added.has(String(p.id))?' checked':''} onchange='toggleCatItem(this,${JSON.stringify(p)})'>${esc(p.name)}</span>
        <span class="muted">${p.default_amount==null?'':ngn(p.default_amount)}</span></label>`).join('')+'</div>';
  },180);
}
// Tick → add the catalogue item (tagged with its id); untick → remove that row.
function toggleCatItem(cb, p){
  if(cb.checked){
    if(document.querySelectorAll('#i_items .i-row').length>=15){ cb.checked=false; return setMsg('i_msg','Maximum 15 items per invoice.','err'); }
    addItem(p.name, p.default_amount==null?'':(p.default_amount/100), 1, p.id);
  } else {
    const row=document.querySelector('#i_items .i-row[data-pid="'+p.id+'"]');
    if(row){ row.remove(); calcTotal(); }
  }
}
async function createInvoice(){
  const items=invItems();
  if(!items.length) return setMsg('i_msg','Add at least one item (name, unit price, quantity).','err');
  if(items.length>15) return setMsg('i_msg','Maximum 15 items per invoice.','err');
  if(_editInvId){
    const eb={ items, charge_vat: el('i_vat').checked, apply_service_charge: svcApplied(),
      department_id: el('i_dept').value||undefined, description: el('i_desc').value,
      recipient_name: el('i_name').value||undefined, recipient_email: el('i_email').value||undefined };
    const er=await api('/invoices/'+_editInvId,{method:'PATCH',body:JSON.stringify(eb)});
    const eBad = er.status && er.data && er.data.resend_error;
    setMsg('i_msg', er.message, (er.status && !eBad)?'ok':'err');
    if(er.status){ resetInvForm(); loadInvoices(); }
    return;
  }
  const body = { items, currency: el('i_cur').value, description: el('i_desc').value,
    charge_vat: el('i_vat').checked, apply_service_charge: svcApplied(), allow_part_payment: el('i_part').checked,
    department_id: el('i_dept').value || undefined,
    scheduled_at: el('i_sched').value || undefined, due_at: el('i_due').value || undefined,
    reminder_interval_days: el('i_rint').value || undefined, reminder_count: el('i_rcnt').value || undefined,
    recipients: _invPickAll ? { all_contacts:true }
              : (_invSel.size ? { contact_ids:[..._invSel.keys()] }
              : { email: el('i_email').value, name: el('i_name').value, phone: el('i_phone').value }) };
  const r = await api('/invoices', { method:'POST', body: JSON.stringify(body) });
  // Green only when it truly sent (or was scheduled). A "created but not sent" is shown red so it's not missed.
  const bad = r.status && r.data && !r.data.scheduled && r.data.failed_count>0;
  setMsg('i_msg', r.message, (r.status && !bad)?'ok':'err');
  showBanner(r.message, (r.status && !bad)?'ok':'err');
  if (r.status){ el('i_desc').value=el('i_email').value=el('i_name').value=el('i_phone').value=''; clearInvRecipients(); el('i_items').innerHTML=''; addItem(); loadInvoices(); }
}
async function resend(id){
  const r=await api(`/invoices/${id}/send`,{method:'POST'});
  const bad = r.status && r.data && r.data.sent===false;
  setMsg('i_msg', r.message, (r.status && !bad)?'ok':'err');
  showBanner(r.message, (r.status && !bad)?'ok':'err');
  loadInvoices();
}
async function cancelInv(id){ if(!confirm('Cancel this invoice?'))return; const r=await api(`/invoices/${id}/cancel`,{method:'POST'}); showBanner(r.message, r.status?'ok':'err'); if(r.status) loadInvoices(); }
// Soft-delete an UNPAID invoice (paid/part-paid are protected server-side too).
async function delInv(id){
  if(!confirm('Delete this invoice? It will be removed from your list.'))return;
  const r=await api('/invoices/'+id,{method:'DELETE'});
  showBanner(r.message, r.status?'ok':'err');
  if(r.status) loadInvoices();
}
// ── Address-book picker for the invoice recipient ─────────────────────────────
// Browse/search saved contacts; picking one fills the recipient email/name/phone.
let _invCTimer=null, _invSel=new Map(), _invPickAll=false;
function searchInvContacts(){
  const q=el('i_csearch').value.trim(); if(_invCTimer) clearTimeout(_invCTimer);
  _invCTimer=setTimeout(async ()=>{
    const qs=new URLSearchParams(); if(q) qs.set('q',q);
    const r=await api('/contacts?'+qs.toString());
    if(!r.status){ el('i_clist').innerHTML='<div class="muted" style="font-size:12px">'+esc(r.message||'Could not load contacts')+'</div>'; return; }
    if(!r.data.length){ el('i_clist').innerHTML='<div class="muted" style="font-size:12px">'+(q?'No matching contacts.':'No saved contacts yet — add them under the Contacts tab.')+'</div>'; return; }
    // Each contact gets a checkbox; ticking adds it (selection persists across filtering).
    // When "Pick all" is on, rows show checked + disabled (the whole book is included).
    el('i_clist').innerHTML='<div style="max-height:210px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-bottom:8px">'+
      r.data.slice(0,200).map(c=>`<label style="display:flex;gap:8px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--line);cursor:pointer">
        <input type="checkbox" style="width:auto"${(_invPickAll||_invSel.has(String(c.id)))?' checked':''}${_invPickAll?' disabled':''} onchange='toggleInvContact(this,${JSON.stringify(c)})'>
        <span>${esc(c.name)} <span class="muted">${esc(c.email||c.phone||'')}</span></span></label>`).join('')+'</div>';
  },180);
}
function toggleInvContact(cb,c){
  if(cb.checked) _invSel.set(String(c.id),{name:c.name,email:c.email,phone:c.phone});
  else _invSel.delete(String(c.id));
  updateInvSel();
}
function pickAllContacts(cb){
  _invPickAll=cb.checked;
  if(_invPickAll) _invSel.clear();     // "all" supersedes individual ticks
  updateInvSel(); searchInvContacts();  // re-render list to reflect checked/disabled state
}
function updateInvSel(){
  const s=el('i_csel'); if(s) s.textContent = _invPickAll ? 'All contacts selected.' : (_invSel.size ? _invSel.size+' contact(s) selected.' : '');
}
function clearInvRecipients(){
  _invSel.clear(); _invPickAll=false;
  const ca=el('i_call'); if(ca) ca.checked=false;
  if(el('i_csel')) el('i_csel').textContent=''; if(el('i_clist')) el('i_clist').innerHTML=''; if(el('i_csearch')) el('i_csearch').value='';
}
// Prominent, self-dismissing page banner for create/send/cancel/delete outcomes.
function showBanner(msg, cls){
  if(!msg) return;
  let b=el('pl_toast');
  if(!b){ b=document.createElement('div'); b.id='pl_toast';
    b.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 22px;border-radius:10px;font-weight:600;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,.20);max-width:92vw;text-align:center';
    document.body.appendChild(b); }
  b.style.background = cls==='ok' ? '#16a34a' : (cls==='err' ? '#dc2626' : '#334155');
  b.textContent=msg; b.style.display='block';
  clearTimeout(b._t); b._t=setTimeout(()=>{ b.style.display='none'; }, 4500);
}

async function tQr(){
  el('main').innerHTML = `
   <div class="card"><h2>Create QR code</h2>
     <div class="grid3">
       <div><label>Type</label><select id="q_type" onchange="el('q_amtw').style.display=this.value==='fixed'?'block':'none'"><option value="fixed">Fixed amount</option><option value="open">Open amount</option></select></div>
       <div id="q_amtw"><label>Amount (₦)</label><input id="q_amt" type="number" min="1"></div>
       <div><label>Department (optional)</label><select id="q_dept"><option value="">—</option></select></div>
     </div>
     <label>Label</label><input id="q_label" placeholder="e.g. Bar, Front Desk, Event Gate">
     <label style="display:flex;gap:6px;align-items:center;margin-top:10px"><input type="checkbox" id="q_vat" style="width:auto"> Charge VAT (7.5%)</label>

   </div>
   <div class="card"><h2>QR codes</h2><div id="q_list" class="muted">Loading…</div></div>`;
  const d = await api('/departments'); if (d.status) el('q_dept').innerHTML='<option value="">—</option>'+d.data.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');

}
async function loadQr(){
  const r = await api('/qr'); if(!r.status){el('q_list').innerHTML=`<span class="msg err">${r.message}</span>`;return;}
  if(!r.data.length){el('q_list').innerHTML='<span class="muted">No QR codes yet.</span>';return;}
  el('q_list').innerHTML = `<table><tr><th>Label</th><th>Type</th><th class="right">Amount</th><th>Active</th><th>Link</th><th></th></tr>`+
    r.data.map(q=>`<tr><td>${esc(q.label||q.reference)}</td><td>${q.type}</td><td class="right">${q.amount===null?'—':ngn(q.amount)}</td><td>${q.is_active?'Yes':'No'}</td>
      <td><a href="${q.pay_url}" target="_blank">open</a></td>

        <button class="mini" onclick="copyShare('${q.pay_url}')">Copy link</button>
        <button class="mini" onclick="toggleQr('${q.id}',${!q.is_active})">${q.is_active?'Disable':'Enable'}</button></td></tr>`).join('')+`</table>`;

async function createQr(){
  const body={ type:el('q_type').value, label:el('q_label').value, charge_vat:el('q_vat').checked, department_id:el('q_dept').value||undefined };
  if(body.type==='fixed'){ const a=parseFloat(el('q_amt').value); if(!a||a<1)return setMsg('q_msg','Enter an amount.','err'); body.amount=Math.round(a*100); }
  const r=await api('/qr',{method:'POST',body:JSON.stringify(body)}); setMsg('q_msg',r.message,r.status?'ok':'err'); if(r.status) loadQr();
}
async function toggleQr(id,act){ const r=await api(`/qr/${id}`,{method:'PATCH',body:JSON.stringify({is_active:act})}); if(r.status) loadQr(); }
function copyShare(u){ navigator.clipboard.writeText(u).then(()=>alert('Payment link copied:\n'+u)); }

// ── CONTACTS ─────────────────────────────────────────────
async function tContacts(){
  el('main').innerHTML=`
   <div class="card"><h2>Add contact</h2>
     <div class="grid3"><div><label>Name</label><input id="c_name"></div><div><label>Email</label><input id="c_email" type="email"></div><div><label>Phone</label><input id="c_phone"></div></div>
     <label>Tags (comma-separated)</label><input id="c_tags" placeholder="Tier 1, Block A">
     <button class="btn" onclick="addContact()">Add</button>
     <button class="btn sec" onclick="el('c_imp').style.display='block'">Bulk import (CSV paste)</button>
     <div id="c_imp" style="display:none;margin-top:12px"><label>Paste rows: name,email,phone (one per line)</label><textarea id="c_csv" rows="5"></textarea><button class="btn" onclick="importContacts()">Import</button></div>
     <div class="msg" id="c_msg"></div>
   </div>
   <div class="card"><h2>Contacts</h2><div id="c_list" class="muted">Loading…</div></div>`;
  loadContacts();
}
async function loadContacts(){
  const r=await api('/contacts'); if(!r.status){el('c_list').innerHTML=`<span class="msg err">${r.message}</span>`;return;}
  if(!r.data.length){el('c_list').innerHTML='<span class="muted">No contacts yet.</span>';return;}
  el('c_list').innerHTML=`<table><tr><th>Name</th><th>Email</th><th>Phone</th><th>Tags</th><th></th></tr>`+
    r.data.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.email||'—')}</td><td>${esc(c.phone||'—')}</td><td>${(c.tags||[]).map(esc).join(', ')}</td><td class="right"><button class="mini" onclick="delContact('${c.id}')">Delete</button></td></tr>`).join('')+`</table>`;
}
async function addContact(){
  const body={ name:el('c_name').value, email:el('c_email').value, phone:el('c_phone').value, tags:el('c_tags').value.split(',').map(t=>t.trim()).filter(Boolean) };
  const r=await api('/contacts',{method:'POST',body:JSON.stringify(body)}); setMsg('c_msg',r.message,r.status?'ok':'err'); if(r.status){el('c_name').value=el('c_email').value=el('c_phone').value=el('c_tags').value='';loadContacts();}
}
async function importContacts(){
  const rows=el('c_csv').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{const[name,email,phone]=l.split(',').map(s=>(s||'').trim());return{name,email,phone};});
  if(!rows.length)return setMsg('c_msg','Nothing to import.','err');
  const r=await api('/contacts/import',{method:'POST',body:JSON.stringify({rows})}); setMsg('c_msg',r.message,r.status?'ok':'err'); if(r.status){el('c_csv').value='';loadContacts();}
}
async function delContact(id){ if(!confirm('Delete contact?'))return; const r=await api(`/contacts/${id}`,{method:'DELETE'}); if(r.status) loadContacts(); }

async function saveFormat(){

async function tDepartments(){
  el('main').innerHTML=`<div class="card"><h2>Create department</h2><label>Name</label><input id="d_name" placeholder="e.g. Bar"><button class="btn" onclick="addDept()">Create</button><div class="msg" id="d_msg"></div></div>

async function loadDepts(){

async function setSvcCharge(id){

async function addDept(){ const r=await api('/departments',{method:'POST',body:JSON.stringify({name:el('d_name').value})}); setMsg('d_msg',r.message,r.status?'ok':'err'); if(r.status){el('d_name').value='';loadDepts();} }
async function addUser(id){
  const body={ name:el('u_name_'+id).value, email:el('u_email_'+id).value, phone:el('u_phone_'+id).value };
  const r=await api(`/departments/${id}/users`,{method:'POST',body:JSON.stringify(body)});
  setMsg('d_umsg_'+id, r.status?`${r.message} (temp password: ${r.data.temp_password})`:r.message, r.status?'ok':'err');

async function loadUsers(id){
  const r=await api(`/departments/${id}/users`); if(!r.status)return;

async function downloadCsv(){
  const res = await fetch(API+'/reports/transactions?format=csv', { headers: TOKEN?{'Authorization':'Bearer '+TOKEN}:{} });
  if (!res.ok) return alert('Could not download CSV.');
  const blob = await res.blob(); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'collections.csv'; a.click(); URL.revokeObjectURL(url);
}
function setMsg(id,msg,cls){ const e=el(id); if(e){e.textContent=msg||'';e.className='msg '+(cls||'');} }
if (!TOKEN) location.href='login.html'; else { renderTabs(); render(); }
