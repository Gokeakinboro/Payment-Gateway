<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billspay Approvals — Super Admin</title>
<link rel="stylesheet" href="paylode-ui.css?v=3">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1a2744;--lime:#7dc534;--bg:#f4f6fb;--gray:#64748b;--line:#cbd5e1;--green:#16a34a}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#1e293b;font-size:14px}
  .top{background:var(--navy);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:14px}
  .top a{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px}.top .t{font-weight:700;font-size:16px;flex:1}
  .wrap{max-width:760px;margin:0 auto;padding:22px}
  .card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:18px}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--gray);margin-bottom:6px}
  .sub{font-size:13px;color:var(--gray);margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray);padding:9px 8px;border-bottom:1px solid var(--line)}
  td{padding:11px 8px;border-bottom:1px solid var(--line)}.right{text-align:right}
  .btn{padding:7px 14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px}
  .btn-lime{background:var(--lime);color:var(--navy)}.btn-out{background:#fff;color:var(--gray);border:1px solid var(--line)}
  .muted{color:var(--gray);text-align:center;padding:24px}
  .msg{padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
  .msg.ok{background:#f0fdf4;color:#166534;display:block}.msg.err{background:#fee2e2;color:#991b1b;display:block}
</style>
</head>
<body>
<div class="top"><a href="dashboard.html">← Dashboard</a><div class="t">Billspay — Approvals</div></div>
<div class="wrap">
  <div class="msg" id="msg"></div>
  <div class="card"><h3>Pending Billspay enablement requests</h3>
    <div class="sub">Billspay holds customer funds — review each merchant before enabling.</div>
    <div id="list"><div class="muted">Loading…</div></div>
  </div>
</div>
<script>
var API='/api/v1';var TOKEN=sessionStorage.getItem('paylode_token');
if(!TOKEN)location.href='/login.html';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function msg(ok,t){var m=document.getElementById('msg');m.className='msg '+(ok?'ok':'err');m.textContent=t;}
async function api(path,opts){opts=opts||{};
  var r=await fetch(API+path,{method:opts.method||'GET',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}});
  if(r.status===401){location.href='/login.html';return{ok:false};}
  if(r.status===403){return{ok:false,forbidden:true};}
  var d=await r.json().catch(function(){return{};});return{ok:r.ok&&d.status!==false,data:d.data,message:d.message};}
async function load(){
  var r=await api('/wallet/admin/requests');var e=document.getElementById('list');
  if(r.forbidden){e.innerHTML='<div class="muted">Super Admin access required.</div>';return;}
  if(!r.ok){e.innerHTML='<div class="muted">Could not load requests.</div>';return;}
  if(!r.data.length){e.innerHTML='<div class="muted">No pending requests 🎉</div>';return;}
  e.innerHTML='<table><tr><th>Merchant</th><th>Requested</th><th class="right">Action</th></tr>'+r.data.map(function(x){
    return '<tr><td>'+esc(x.business_name||x.merchant_id)+'</td><td>'+(x.requested_at?new Date(x.requested_at).toLocaleString():'—')+'</td>'+
    '<td class="right"><button class="btn btn-lime" onclick="approve(\''+x.merchant_id+'\',\''+esc(x.business_name||'').replace(/\x27/g,'')+'\')">Enable</button> '+
    '<button class="btn btn-out" onclick="reject(\''+x.merchant_id+'\')">Reject</button></td></tr>';
  }).join('')+'</table>';
}
async function approve(id,name){if(!confirm('Enable Billspay for '+(name||'this merchant')+'?'))return;
  var r=await api('/wallet/admin/'+id+'/approve',{method:'POST'});msg(r.ok,r.ok?'Wallet enabled for '+(name||'merchant'):(r.message||'Failed'));if(r.ok)load();}
async function reject(id){if(!confirm('Reject this request?'))return;
  var r=await api('/wallet/admin/'+id+'/reject',{method:'POST'});msg(r.ok,r.ok?'Request rejected':(r.message||'Failed'));if(r.ok)load();}
load();
</script>
</body>
</html>
