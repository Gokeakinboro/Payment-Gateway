<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Wallet — Paylode</title>
<link rel="stylesheet" href="paylode-ui.css?v=3">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1a2744;--lime:#7dc534;--bg:#f4f6fb;--card:#fff;--gray:#64748b;--line:#cbd5e1;--green:#16a34a;--red:#dc2626;--amber:#f59e0b}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:#1e293b;font-size:14px}
  .top{background:var(--navy);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:14px}
  .top a{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px}
  .top .t{font-weight:700;font-size:16px;flex:1}
  .wrap{max-width:920px;margin:0 auto;padding:20px}
  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:8px;background:#fff;border:2px solid var(--line);font-weight:600;color:var(--gray);cursor:pointer;font-size:13px}
  .tab.on{background:var(--lime);color:var(--navy);border-color:var(--lime);font-weight:700}
  .pane{display:none}.pane.on{display:block}
  .card{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--gray);margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .stat{background:#fff;border:2px solid var(--line);border-radius:12px;padding:14px}
  .stat .l{font-size:12px;color:var(--gray)}.stat .v{font-size:22px;font-weight:800;margin-top:4px}
  label{display:block;font-size:12px;font-weight:600;color:#475569;margin:10px 0 4px}
  input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #cbd5e1;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--navy)}
  .row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
  .btn{padding:10px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
  .btn:disabled{opacity:.6}.btn-lime{background:var(--lime);color:var(--navy)}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-out{background:#fff;color:var(--gray);border:1px solid var(--line)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--gray);padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line)}
  .right{text-align:right}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .pill.pending{background:#fef3c7;color:#92400e}.pill.approved{background:#d1fae5;color:#065f46}.pill.rejected{background:#fee2e2;color:#991b1b}
  .msg{padding:9px 12px;border-radius:8px;font-size:13px;margin:10px 0;display:none}
  .msg.ok{background:#f0fdf4;color:#166534;display:block}.msg.err{background:#fee2e2;color:#991b1b;display:block}
  .muted{color:var(--gray);text-align:center;padding:18px}
  .logo-prev{width:64px;height:64px;border-radius:10px;border:1px solid var(--line);object-fit:contain;background:#fff;display:none}
  .gate{max-width:480px;margin:60px auto;text-align:center}
  .gate .ic{font-size:42px}.gate h2{margin:10px 0 6px;color:var(--navy)}
</style>
</head>
<body>
<div class="top"><a href="dashboard.html">← Dashboard</a><div class="t" id="brandt">Member Wallet</div></div>
<div class="wrap" id="root"><div class="muted">Loading…</div></div>

<script>
var API='/api/v1';
var TOKEN=sessionStorage.getItem('paylode_token');
if(!TOKEN)location.href='/login.html';
var CFG=null;
async function api(path,opts){opts=opts||{};var h={'Content-Type':'application/json','Authorization':'Bearer '+TOKEN};
  var r=await fetch(API+path,{method:opts.method||'GET',headers:h,body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===401){location.href='/login.html';return{ok:false};}
  var d=await r.json().catch(function(){return{};});return{ok:r.ok&&d.status!==false,status:r.status,data:d.data,message:d.message};}
function ngn(k){return '₦'+(Number(k||0)/100).toLocaleString('en-NG',{minimumFractionDigits:2});}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function el(id){return document.getElementById(id);}

(async function boot(){
  var r=await api('/wallet/config');
  CFG=r.ok?r.data:null;
  if(!CFG||!CFG.enabled){ return renderGate(); }
  if(CFG.brand_name)el('brandt').textContent=CFG.brand_name+' — Wallet';
  renderApp();
})();

function renderGate(){
  var requested=CFG&&CFG.requested;
  el('root').innerHTML='<div class="gate"><div class="ic">🔐</div><h2>Member Wallet</h2>'+
    (requested
      ? '<p class="muted">Your request is pending Paylode approval. We\'ll enable it shortly.</p>'
      : '<p style="color:#64748b;margin-bottom:16px">A closed-loop wallet for your members to fund and spend across your departments. Holds customer funds, so Paylode reviews each activation.</p><button class="btn" id="reqbtn" onclick="reqWallet()">Request wallet access</button>')+
    '<div class="msg" id="gmsg"></div></div>';
}
async function reqWallet(){
  el('reqbtn').disabled=true;
  var r=await api('/wallet/config/request',{method:'POST'});
  var m=el('gmsg');m.className='msg '+(r.ok?'ok':'err');m.textContent=r.ok?'Requested — pending Paylode approval.':(r.message||'Failed');
}

function renderApp(){
  el('root').innerHTML=
    '<div class="tabs">'+['overview','members','approvals','settings'].map(function(t,i){return '<div class="tab'+(i===0?' on':'')+'" data-p="'+t+'" onclick="tab(\''+t+'\')">'+t.charAt(0).toUpperCase()+t.slice(1)+'</div>';}).join('')+'</div>'+
    '<div class="pane on" id="p-overview"><div class="grid" id="ov-stats"></div><div class="card"><h3>Department balances</h3><div id="ov-depts"></div></div></div>'+
    '<div class="pane" id="p-members">'+
      '<div class="card"><h3>Onboard a member</h3><div class="row"><input id="mb-name" placeholder="Full name"><input id="mb-email" placeholder="Email"><input id="mb-phone" placeholder="Phone (optional)"></div><button class="btn btn-lime" style="margin-top:10px" onclick="addMember()">Onboard + email password</button><div class="msg" id="mb-msg"></div></div>'+
      '<div class="card"><h3>Bulk onboard</h3><label>One per line: name, email, phone</label><textarea id="mb-bulk" rows="4" placeholder="Jane Doe, jane@x.com, 08012345678"></textarea><button class="btn" style="margin-top:10px" onclick="bulkMembers()">Import list</button><div class="msg" id="mb-bmsg"></div></div>'+
      '<div class="card"><h3>Members</h3><div id="mb-list"><div class="muted">Loading…</div></div></div></div>'+
    '<div class="pane" id="p-approvals"><div class="card"><h3>Pending load approvals</h3><div id="ap-list"><div class="muted">Loading…</div></div></div></div>'+
    '<div class="pane" id="p-settings"><div class="card"><h3>White-label branding</h3>'+
      '<label>Wallet name</label><input id="st-name">'+
      '<label>Logo (PNG/JPG/SVG, ≤2 MB, square ~512×512)</label><div class="row" style="align-items:center"><input type="file" id="st-logo" accept="image/png,image/jpeg,image/svg+xml" onchange="prevLogo(this)" style="flex:2"><img class="logo-prev" id="st-logoprev"></div>'+
      '<label>Brand colour</label><input id="st-color" type="color" style="height:42px;padding:4px">'+
      '<div class="row"><div><label>Sender email</label><input id="st-semail"></div><div><label>Sender WhatsApp</label><input id="st-swa"></div></div>'+
      '<h3 style="margin-top:18px">Limits & alerts</h3><div class="row"><div><label>Max wallet balance (₦)</label><input id="st-max" type="number"></div><div><label>Low-balance alert default (₦)</label><input id="st-low" type="number"></div></div>'+
      '<label style="display:flex;gap:8px;align-items:center;margin-top:12px"><input type="checkbox" id="st-nemail" style="width:auto"> Email notifications</label>'+
      '<label style="display:flex;gap:8px;align-items:center"><input type="checkbox" id="st-nwa" style="width:auto"> WhatsApp notifications</label>'+
      '<button class="btn btn-lime" style="margin-top:14px" onclick="saveCfg()">Save settings</button><div class="msg" id="st-msg"></div></div></div>';
  loadOverview();loadMembers();loadApprovals();fillSettings();
}
function tab(p){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.p===p)});document.querySelectorAll('.pane').forEach(function(x){x.classList.remove('on')});el('p-'+p).classList.add('on');}

async function loadOverview(){
  var r=await api('/wallet/reports/summary');if(!r.ok)return;var s=r.data;
  el('ov-stats').innerHTML=[['Float held',ngn(s.float_total)],['Members',s.members],['Funded',ngn(s.funded_total)],['Spent',ngn(s.spent_total)],['Pending approvals',s.pending_loads],['Reconciled',s.reconciliation&&s.reconciliation.balanced?'✓ Yes':'⚠ Check']]
    .map(function(x){return '<div class="stat"><div class="l">'+x[0]+'</div><div class="v">'+x[1]+'</div></div>';}).join('');
  var d=await api('/wallet/reports/departments');
  el('ov-depts').innerHTML=(d.ok&&d.data.length)?('<table><tr><th>Department</th><th class="right">Balance</th></tr>'+d.data.map(function(x){return '<tr><td>'+esc(x.name)+'</td><td class="right">'+ngn(x.balance)+'</td></tr>';}).join('')+'</table>'):'<div class="muted">No departments yet</div>';
}
async function addMember(){
  var m=el('mb-msg');m.className='msg';
  var body={name:el('mb-name').value,email:el('mb-email').value,phone:el('mb-phone').value};
  var r=await api('/wallet/members',{method:'POST',body:body});
  m.className='msg '+(r.ok?'ok':'err');m.textContent=r.ok?('Onboarded. Temp password: '+r.data.temp_password+' (also emailed)'):(r.message||'Failed');
  if(r.ok){el('mb-name').value=el('mb-email').value=el('mb-phone').value='';loadMembers();}
}
async function bulkMembers(){
  var rows=el('mb-bulk').value.split('\n').map(function(l){return l.trim();}).filter(Boolean).map(function(l){var p=l.split(',').map(function(s){return s.trim();});return{name:p[0],email:p[1],phone:p[2]||''};});
  if(!rows.length)return;
  var r=await api('/wallet/members/import',{method:'POST',body:{members:rows}});var m=el('mb-bmsg');
  m.className='msg '+(r.ok?'ok':'err');m.textContent=r.ok?('Onboarded '+r.data.onboarded_count+', '+r.data.failed+' failed.'):(r.message||'Failed');
  if(r.ok){el('mb-bulk').value='';loadMembers();}
}
async function loadMembers(){
  var r=await api('/wallet/members');var e=el('mb-list');
  e.innerHTML=(r.ok&&r.data.length)?('<table><tr><th>Name</th><th>Email</th><th class="right">Balance</th><th>Status</th></tr>'+r.data.map(function(x){return '<tr><td>'+esc(x.name)+'</td><td>'+esc(x.email||'—')+'</td><td class="right">'+ngn(x.balance)+'</td><td>'+x.status+'</td></tr>';}).join('')+'</table>'):'<div class="muted">No members yet</div>';
}
async function loadApprovals(){
  var r=await api('/wallet/loads/requests?status=pending');var e=el('ap-list');
  e.innerHTML=(r.ok&&r.data.length)?('<table><tr><th>Member</th><th>Type</th><th class="right">Amount</th><th>Reason</th><th></th></tr>'+r.data.map(function(x){return '<tr><td>'+esc(x.member_name)+'</td><td>'+x.type+'</td><td class="right">'+ngn(x.amount)+'</td><td>'+esc(x.reason||'')+'</td><td class="right"><button class="btn btn-sm" onclick="approve(\''+x.id+'\')">Approve</button> <button class="btn btn-sm btn-out" onclick="reject(\''+x.id+'\')">Reject</button></td></tr>';}).join('')+'</table>'):'<div class="muted">No pending approvals</div>';
}
async function approve(id){if(!confirm('Approve this load?'))return;var r=await api('/wallet/loads/requests/'+id+'/approve',{method:'POST'});if(r.ok){loadApprovals();loadOverview();}else alert(r.message||'Failed');}
async function reject(id){var r=await api('/wallet/loads/requests/'+id+'/reject',{method:'POST'});if(r.ok)loadApprovals();else alert(r.message||'Failed');}

var LOGO_FILE=null;
function prevLogo(inp){var f=inp.files&&inp.files[0];if(!f)return;if(f.size>2*1024*1024){alert('Logo must be ≤ 2 MB');inp.value='';return;}LOGO_FILE=f;var p=el('st-logoprev');p.src=URL.createObjectURL(f);p.style.display='block';}
function fillSettings(){el('st-name').value=CFG.brand_name||'';el('st-color').value=CFG.brand_color||'#1a2744';el('st-semail').value=CFG.sender_email||'';el('st-swa').value=CFG.sender_whatsapp||'';el('st-max').value=(CFG.max_balance||300000000)/100;el('st-low').value=(CFG.low_balance_default||0)/100;el('st-nemail').checked=CFG.notify_email!==false;el('st-nwa').checked=CFG.notify_whatsapp!==false;if(CFG.brand_logo_url){var p=el('st-logoprev');p.src=CFG.brand_logo_url;p.style.display='block';}}
async function saveCfg(){
  var m=el('st-msg');m.className='msg';
  var logoUrl=CFG.brand_logo_url||null;
  if(LOGO_FILE){m.className='msg ok';m.textContent='Uploading logo…';
    var fd=new FormData();fd.append('file',LOGO_FILE);
    var ur=await fetch(API+'/uploads/document',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
    var ud=await ur.json().catch(function(){return{};});
    if(ud&&ud.data&&ud.data.url)logoUrl=ud.data.url;else{m.className='msg err';m.textContent='Logo upload failed';return;}
  }
  var body={brand_name:el('st-name').value,brand_logo_url:logoUrl,brand_color:el('st-color').value,sender_email:el('st-semail').value,sender_whatsapp:el('st-swa').value,max_balance:Math.round(parseFloat(el('st-max').value||0)*100),low_balance_default:Math.round(parseFloat(el('st-low').value||0)*100),notify_email:el('st-nemail').checked,notify_whatsapp:el('st-nwa').checked};
  var r=await api('/wallet/config',{method:'PUT',body:body});
  m.className='msg '+(r.ok?'ok':'err');m.textContent=r.ok?'Settings saved':(r.message||'Failed');
  if(r.ok){CFG=r.data;LOGO_FILE=null;if(CFG.brand_name)el('brandt').textContent=CFG.brand_name+' — Wallet';}
}
</script>
</body>
</html>
