# Paylode 176 internal API router (P3 split).
#
# Runs ON 176, listening on :3000 — the same port the live web box (45) already
# proxies /api/ to. It path-routes each product's traffic to its own pm2 service
# and everything else to the money core. Because it keeps :3000 and all public
# paths identical, the 45 nginx and the frontend/SDKs need ZERO changes.
#
# Install on 176:
#   cp nginx/paylode-176-router.conf /etc/nginx/conf.d/paylode-router.conf
#   nginx -t && systemctl reload nginx
#
# Rollback: remove this file (or point everything back to the monolith on :3000)
#   and `pm2 start src/server.js --name paylode-api -i max`.

upstream paylode_core      { server 127.0.0.1:3001; keepalive 16; }
upstream paylode_invoicing { server 127.0.0.1:3101; keepalive 8;  }
upstream paylode_wallet    { server 127.0.0.1:3102; keepalive 8;  }
upstream paylode_assistant { server 127.0.0.1:3103; keepalive 8;  }

server {
    # Must bind all interfaces (0.0.0.0:3000) — this replaces the node app that
    # bound *:3000, and the live web box (45) proxies to 176's PUBLIC :3000.
    listen 3000;
    server_name _;
    server_tokens off;
    client_max_body_size 55m;   # onboarding submit carries base64 doc scans (50mb JSON)

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Product services — each independently deployable.
    location /api/v1/invoicing { proxy_pass http://paylode_invoicing; }
    location /api/v1/wallet     { proxy_pass http://paylode_wallet; }
    location /api/v1/assistant  { proxy_pass http://paylode_assistant; }

    # Everything else = the money core (checkout, VA, transactions, payouts,
    # settlements, rails, merchants, reports, auth, admin, kyc, onboarding, …).
    location / { proxy_pass http://paylode_core; }
}
