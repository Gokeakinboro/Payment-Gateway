# ─── Paylode Services — Nginx Production Config ───────────────────────────────
# Cloudflare (proxy) → Contabo VPS (origin)
# Domain: paylodeservices.com

# Trust Cloudflare IP ranges for real visitor IP
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# ── API Server ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.paylodeservices.com;

    server_tokens off;
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/paylode_api_access.log;
    error_log  /var/log/nginx/paylode_api_error.log warn;

    # Health check (Cloudflare uses this)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # API routes
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      'upgrade';
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS for API
        add_header Access-Control-Allow-Origin  "https://paylodeservices.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Paylode-Signature" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Block everything else
    location / { return 404; }
}

# ── Main Frontend (dashboard) ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name paylodeservices.com www.paylodeservices.com;

    server_tokens off;
    root /var/www/paylode;
    index index.html;

    access_log /var/log/nginx/paylode_access.log;
    error_log  /var/log/nginx/paylode_error.log warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location ~ /\. { deny all; return 404; }

    location /health {
        return 200 'paylode-ok';
        add_header Content-Type text/plain;
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
}
