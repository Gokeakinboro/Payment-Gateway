name: Deploy Paylode Gateway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Contabo via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # Refresh ONLY the frontend files from main, then copy them to the web
            # root. A full 'git pull' here fails on local backend changes and used
            # to copy a STALE app.js over good deploys — that revert loop is fixed
            # by scoping this to the frontend. Backend is deployed separately via
            # the gated tools/deploy.py.
            git fetch origin main --quiet
            git checkout origin/main -- app.js api-wiring.js dashboard.html onboarding.html login.html index.html checkout.html
            cp app.js api-wiring.js dashboard.html onboarding.html login.html index.html checkout.html /var/www/paylode/
            pm2 reload paylode-api || true
            nginx -s reload
            echo "Frontend deployed from main at $(date)"