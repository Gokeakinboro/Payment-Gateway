<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paylode — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0f1829;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:420px}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px;cursor:pointer;text-decoration:none;transition:color .15s}
.back:hover{color:rgba(255,255,255,.8)}
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.role-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #f1f5f9}
.role-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.role-name{font-size:16px;font-weight:700;color:#1a2744}
.role-desc{font-size:12px;color:#64748b;margin-top:2px}
.err{background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#991b1b;margin-bottom:16px;display:none}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
input{width:100%;padding:11px 13px;border:1.5px solid #cbd5e1;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:#1e293b;outline:none;transition:border-color .15s}
input:focus{border-color:#1a2744;box-shadow:0 0 0 3px rgba(26,39,68,.08)}
.password-wrapper{position:relative;display:flex;align-items:center;width:100%}
.password-wrapper input{padding-right:40px}
.toggle-password{position:absolute;right:12px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;transition:color .15s;padding:4px;outline:none}
.toggle-password:hover{color:#1a2744}
.toggle-password svg{width:20px;height:20px;display:block}
.btn{width:100%;padding:13px;background:#1a2744;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;transition:background .15s}
.btn:hover{background:#253360}
.btn:disabled{opacity:.7;cursor:not-allowed}
.footer-note{text-align:center;margin-top:16px;font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/index.html">← Back to portal selection</a>
  <div class="card">
    <div class="role-header" id="role-header">
      <div class="role-icon" id="role-icon">🏛</div>
      <div>
        <div class="role-name" id="role-name">Super Admin</div>
        <div class="role-desc" id="role-desc">Full platform access</div>
      </div>
    </div>
    <div class="err" id="err"></div>
    <div class="field">
      <label>Email address</label>
      <input type="email" id="em" placeholder="Enter your email address" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="toggle-password" id="toggle-pw" aria-label="Toggle Password Visibility" tabindex="-1">
          <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
          <svg class="eye-slash-icon" style="display: none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
          </svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <div class="footer-note">Paylode Services Limited &nbsp;·&nbsp; CBN Licensed PSSP</div>
  </div>
</div>

<script>
const ROLES = {
  superadmin:  { icon:'🏛', name:'Super Admin',        desc:'Full platform access',           bg:'#e8edf5' },
  compliance:  { icon:'⚖',  name:'Compliance Officer', desc:'KYC & AML monitoring',            bg:'#fef3c7' },
  aggregator:  { icon:'🔗', name:'Aggregator',          desc:'Portfolio management',            bg:'#dbeafe' },
  merchant:    { icon:'🏪', name:'Merchant',             desc:'Transactions & API keys',        bg:'#d1fae5' },
};

// Set role display from stored selection
const role = localStorage.getItem('paylode_selected_role') || 'superadmin';
const r    = ROLES[role] || ROLES.superadmin;
document.getElementById('role-icon').textContent    = r.icon;
document.getElementById('role-icon').style.background = r.bg;
document.getElementById('role-name').textContent    = r.name;
document.getElementById('role-desc').textContent    = r.desc;

async function doLogin() {
  const email = document.getElementById('em').value.trim();
  const pass  = document.getElementById('pw').value;
  const err   = document.getElementById('err');
  const btn   = document.getElementById('btn');

  if (!email || !pass) {
    err.textContent = 'Please enter your email and password';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Signing in...';
  btn.disabled    = true;
  err.style.display = 'none';

  try {
    const res  = await fetch('/api/v1/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();

    if (data.status && data.data && data.data.token) {
      localStorage.setItem('paylode_token', data.data.token);
      localStorage.setItem('paylode_user',  JSON.stringify(data.data.user));
      // Redirect to dashboard
      window.location.href = '/dashboard.html';
    } else {
      err.textContent   = data.message || 'Invalid email or password';
      err.style.display = 'block';
      btn.textContent   = 'Sign In';
      btn.disabled      = false;
    }
  } catch(e) {
    err.textContent   = 'Cannot connect to server. Please try again.';
    err.style.display = 'block';
    btn.textContent   = 'Sign In';
    btn.disabled      = false;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Setup password visibility toggle
const pwInput = document.getElementById('pw');
const togglePw = document.getElementById('toggle-pw');
if (pwInput && togglePw) {
  const eyeIcon = togglePw.querySelector('.eye-icon');
  const eyeSlashIcon = togglePw.querySelector('.eye-slash-icon');
  togglePw.addEventListener('click', () => {
    if (pwInput.type === 'password') {
      pwInput.type = 'text';
      eyeIcon.style.display = 'none';
      eyeSlashIcon.style.display = 'block';
    } else {
      pwInput.type = 'password';
      eyeIcon.style.display = 'block';
      eyeSlashIcon.style.display = 'none';
    }
  });
}
</script>
</body>
</html>
