<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Paylode Sign In</title><style>body{font-family:sans-serif;background:#1a2744;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.box{background:#fff;padding:32px;border-radius:12px;width:360px}.logo{text-align:center;margin-bottom:20px;color:#1a2744;font-size:20px;font-weight:700}input{width:100%;padding:10px;margin:6px 0 14px;border:1px solid #ccc;border-radius:6px;font-size:14px;box-sizing:border-box}.btn{width:100%;padding:12px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}.err{color:red;font-size:13px;display:none;margin-bottom:10px}hr{margin:16px 0}.qr{padding:8px;cursor:pointer;border-radius:4px;font-size:13px}.qr:hover{background:#f0f0f0}</style></head><body><div class="box"><div class="logo">P Paylode Services</div><div class="err" id="err"></div><input type="email" id="em" placeholder="Email"><input type="password" id="pw" placeholder="Password"><button class="btn" onclick="go()">Sign In</button><hr><div class="qr" onclick="f('admin@paylodeservices.com','Admin@Paylode2025!')">Super Admin</div><div class="qr" onclick="f('compliance@paylodeservices.com','Comply@Paylode2025!')">Compliance Officer</div><div class="qr" onclick="f('agg@finconnect.ng','Agg@Connect2025!')">Aggregator</div><div class="qr" onclick="f('payments@boltnigeria.com','Bolt@Merchant2025!')">Merchant</div></div><script>function f(e,p){document.getElementById('em').value=e;document.getElementById('pw').value=p;}async function go(){var e=document.getElementById('em').value,p=document.getElementById('pw').value,err=document.getElementById('err'),btn=document.querySelector('.btn');if(!e||!p){err.textContent='Enter email and password';err.style.display='block';return;}btn.textContent='...';try{var r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});var d=await r.json();if(d.status&&d.data.token){localStorage.setItem('paylode_token',d.data.token);localStorage.setItem('paylode_user',JSON.stringify(d.data.user));window.location.href='/index.html';}else{err.textContent=d.message||'Invalid credentials';err.style.display='block';btn.textContent='Sign In';}}catch(x){err.textContent='Connection error';err.style.display='block';btn.textContent='Sign In';}}document.addEventListener('keydown',function(e){if(e.key==='Enter')go();});if(localStorage.getItem('paylode_token'))window.location.href='/index.html';</script></body></html>
